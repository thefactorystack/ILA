site_name: Industrial Layered Architecture (ILA)
site_description: A practical, open framework for structuring industrial automation systems
site_author: Simon Christiansen
site_url: https://thefactorystack.github.io/ILA/
repo_url: https://github.com/thefactorystack/ILA
repo_name: thefactorystack/ILA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: light
      primary: deep-orange
      accent: deep-orange
  language: en

nav:
  - Home: index.md
  - Overview: pages/01-overview.md
  - Getting Started: pages/02-getting-started.md
  - Layers:
    - Field: pages/03-layer1-field.md
    - Control: pages/04-layer2-control.md
    - Supervisory: pages/05-layer3-supervisory.md
    - Data: pages/06-layer4-data.md
    - OT Platform: pages/07-layer5-otplatform.md
  - Standards Bridge: pages/08-standards-bridge.md
  - Community:
    - Contributing: pages/contributing.md
    - Governance: pages/governance.md

markdown_extensions:
  - toc
  - tables
  - codehilite
  - pymdownx.superfences

extra_css:
  - css/ila.css

plugins:
  - search

copyright: CC BY 4.0 - Built by Simon Christiansen