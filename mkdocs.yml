site_name: Industrial Layered Architecture (ILA)
site_description: A practical, open framework for structuring industrial automation systems
site_author: Simon Christiansen
site_url: https://thefactorystack.github.io/ILA/
repo_url: https://github.com/thefactorystack/ILA
repo_name: thefactorystack/ILA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Dark mode (default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    # Light mode fallback
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  
  font:
    text: Inter
    code: JetBrains Mono
  
  language: en
  
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Overview: pages/01-overview.md
  - Getting Started: pages/02-getting-started.md
  - Layers:
    - Field: pages/03-layer1-field.md
    - Control: pages/04-layer2-control.md
    - Supervisory: pages/05-layer3-supervisory.md
    - Data: pages/06-layer4-data.md
    - OT Platform: pages/07-layer5-otplatform.md
  - Standards Bridge: pages/08-standards-bridge.md
  - Community:
    - Contributing: pages/contributing.md
    - Governance: pages/governance.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed
  - attr_list
  - md_in_html

extra_css:
  - css/ila-dark.css

plugins:
  - search

copyright: |
